name: YouTube Downloader (Debug)

on:
  workflow_dispatch:

jobs:
  download_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install yt-dlp
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Create output directory
        run: |
          mkdir -p output
          ls -lah

      - name: Download video (debug)
        run: |
          VIDEO_URL="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
          OUTPUT_PATH="output/%(title)s.%(ext)s"

          echo "VIDEO_URL=$VIDEO_URL"
          echo "OUTPUT_PATH=$OUTPUT_PATH"

          yt-dlp -f worst \
            --verbose \
            --no-playlist \
            -o "$OUTPUT_PATH" \
            "$VIDEO_URL"

          echo "=== output directory after download ==="
          ls -lah output || true
          echo "=== list matching files ==="
          ls -lah output/*.mp4 output/*.webm 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-youtube-video
          path: output
          if-no-files-found: error
