name: Download YouTube (Lowest Quality)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp (Latest Version)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          # Install yt-dlp from PyPI to ensure we have the latest fixes for YouTube's API
          pip install --upgrade yt-dlp

      - name: Download video (lowest resolution)
        run: |
          mkdir -p output
          # Using the latest yt-dlp installed above. 
          # If you still get errors, you can add --user-agent flag as shown in the previous answer.
          yt-dlp -f "worst" \
          "https://www.youtube.com/watch?v=dQw4w9WgXcQ" \
          -o "output/%(title)s.%(ext)s"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: output