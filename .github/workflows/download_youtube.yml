name: Download YouTube (Lowest Quality)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install pytube beautifulsoup4

      - name: Run script
        env:
          URL: "https://youtu.be/ELJCJeTyI1A?si=K8u9oLgheTMvpOD9"
        run: |
          mkdir -p output
          python3 your_script.py "$URL" --output-path output

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: output

      - name: Commit and push
        run: |
          set -e
          ls -lah output || true

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git fetch --all
          git checkout -B main

          mkdir -p saved-videos
          cp -v output/*.mp4 saved-videos/ 2>/dev/null || true

          if [ -z "$(ls -1 saved-videos/*.mp4 2>/dev/null)" ]; then
            echo "No files found. Exiting."
            exit 0
          fi

          git add -A
          git commit -m "Add YouTube download ($(date -u +'%Y-%m-%dT%H-%M-%SZ'))" || exit 0

          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
