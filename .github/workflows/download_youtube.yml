name: Download YouTube (Lowest Quality) + Public Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install latest yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
          -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Download video (lowest resolution)
        run: |
          mkdir -p output
          yt-dlp -f "worst" \
            -o "output/%(title)s.%(ext)s" \
            "https://www.youtube.com/watch?v=dQw4w9WgXcQ"

      - name: Create Release and upload file
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "yt-${{ github.run_id }}"
          name: "YouTube Download (run ${{ github.run_id }})"
          draft: false
          prerelease: false
          files: |
            output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
