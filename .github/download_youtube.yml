name: Download YouTube (Lowest Quality)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y yt-dlp

      - name: Download video (lowest resolution)
        run: |
          mkdir output
          yt-dlp -f "worst" \
          ""https://www.youtube.com/watch?v=dQw4w9WgXcQ"" \
          -o "output/%(title)s.%(ext)s"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: output
